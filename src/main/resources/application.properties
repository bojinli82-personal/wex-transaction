# ============================================
# DEFAULT CONFIGURATION (Production-Ready)
# Override with application-dev.properties for development
# ============================================

# Application Identity
spring.application.name=wex-transaction
spring.application.version=1.0.0

# Server Configuration
server.port=8080
server.servlet.context-path=/api
server.compression.enabled=true
server.compression.min-response-size=1024
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.include-exception=false

# Database Configuration
spring.datasource.url=jdbc:h2:mem:wex_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.jdbc.fetch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Logging Configuration
logging.level.root=WARN
logging.level.com.wex.transaction=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/wex-transaction.log
logging.file.max-size=10MB
logging.file.max-history=30

# Treasury API Configuration
treasury.api.base-url=https://api.fiscaldata.treasury.gov/services/api/fiscal_service/v1
treasury.api.endpoint=/accounting_reporting_rates_of_exchange
treasury.api.timeout-seconds=30
treasury.api.max-retries=5
treasury.api.retry-delay-ms=2000

# Cache Configuration (for exchange rates)
cache.exchange-rate.ttl-minutes=1440
cache.exchange-rate.max-size=5000