spring.application.name=wex-transaction
spring.application.version=1.0.0

# Server Configuration
server.port=8080
server.servlet.context-path=/api

# Database Configuration
spring.datasource.url=jdbc:h2:mem:wex_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Logging Configuration
logging.level.root=INFO
logging.level.com.wex.transaction=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# H2 Console (optional, for development)
spring.h2.console.enabled=false

# Treasury API Configuration
treasury.api.base-url=https://api.fiscaldata.treasury.gov/services/api/fiscal_service/v1
treasury.api.endpoint=/accounting_reporting_rates_of_exchange
treasury.api.timeout-seconds=15
treasury.api.max-retries=3
treasury.api.retry-delay-ms=1000

# Cache Configuration (for exchange rates)
cache.exchange-rate.ttl-minutes=60
cache.exchange-rate.max-size=1000