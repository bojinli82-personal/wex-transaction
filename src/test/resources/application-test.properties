# Application Configuration for Testing

# Use in-memory H2 database for tests
spring.datasource.url=jdbc:h2:mem:test_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Disable H2 console for tests
spring.h2.console.enabled=false

# Reduce timeout for faster test execution
treasury.api.timeout-seconds=5
treasury.api.max-retries=1
treasury.api.retry-delay-ms=100

# Smaller cache for tests
cache.exchange-rate.ttl-minutes=1
cache.exchange-rate.max-size=100

# Reduce logging during tests
logging.level.root=WARN
logging.level.com.wex=INFO
